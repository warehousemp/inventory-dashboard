<!DOCTYPE html>
<html>
<head>
  <title>Service Team - Inventory System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Molinari Inventory">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="theme-color" content="#0b3c5d">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f8fb;
      margin: 0;
      padding: 0;
      color: #1f2933;
    }

    .header-bar {
      background: #dd6b20;
      color: white;
      padding: 18px 30px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title {
      font-size: 20px;
      font-weight: bold;
    }

    .nav-link {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.16);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.24);
    }

    .page-wrapper {
      max-width: 850px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      padding: 26px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      border: 1px solid #e6edf3;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #0b3c5d;
      font-size: 22px;
    }

    label {
      display: block;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #dd6b20;
      box-shadow: 0 0 0 3px rgba(221,107,32,0.15);
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 14px;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button:active {
      transform: scale(0.98);
    }

    .lookup-btn {
      background: #dd6b20;
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    pre {
      background: #f0f4f8;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 700px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      line-height: 1.45;
    }

    .help-text {
      margin-top: -8px;
      margin-bottom: 15px;
      font-size: 12px;
      color: #667085;
      line-height: 1.4;
    }

    @media (max-width: 650px) {
      .header-bar {
        padding: 16px 18px;
        text-align: center;
        justify-content: center;
      }

      .header-title {
        width: 100%;
        text-align: center;
      }

      .nav-link {
        width: 100%;
        text-align: center;
      }

      .page-wrapper {
        margin: 18px auto;
        padding: 0 12px;
      }

      .card {
        padding: 20px;
        border-radius: 12px;
      }

      h2 {
        font-size: 20px;
      }

      input {
        font-size: 16px;
        padding: 13px;
      }

      button {
        width: 100%;
        padding: 14px;
        font-size: 15px;
      }

      pre {
        font-size: 12px;
        max-height: 420px;
      }
    }
  </style>
</head>

<body>

<div class="header-bar">
  <div class="header-title">Molinari Pools – Service Team</div>
  <a class="nav-link" href="index.html">Back to Main Menu</a>
</div>

<div class="page-wrapper">

  <div class="card">

    <h2>Service Team Parts Lookup</h2>

    <label>Part Number:</label>
    <input id="lookupPart" list="partsList" placeholder="Start typing part number..." autocomplete="off">
    <datalist id="partsList"></datalist>

    <div class="help-text">
      Search by exact part number to view current stock by location.
    </div>

    <button class="lookup-btn" onclick="lookupInventoryPart()">LOOKUP PART STOCK</button>

    <pre id="lookupResult">Enter a part number to see quantity on hand...</pre>

  </div>

</div>

<script>
const SUPABASE_URL = "https://icqkuhbhcennhhbbwqgo.supabase.co";
const SUPABASE_KEY = "sb_publishable_SZ_roAnr4fuwwF5S3LjC6g_Ryfz5C8R";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let partsData = [];

async function loadParts() {
  let allParts = [];
  let from = 0;
  const batchSize = 1000;

  while (true) {
    const { data, error } = await client
      .rpc('get_parts_dropdown')
      .range(from, from + batchSize - 1);

    if (error) {
      console.error('Parts dropdown load error:', error);
      alert('Parts dropdown load error: ' + error.message);
      return;
    }

    if (!data || data.length === 0) {
      break;
    }

    allParts = allParts.concat(data);

    if (data.length < batchSize) {
      break;
    }

    from += batchSize;
  }

  partsData = allParts;

  const datalist = document.getElementById('partsList');
  datalist.innerHTML = '';

  partsData.forEach(part => {
    const option = document.createElement('option');
    option.value = part.part_number;
    datalist.appendChild(option);
  });

  console.log('Parts loaded into service dropdown:', partsData.length);
}

async function lookupInventoryPart() {
  const partNumber = document.getElementById('lookupPart').value.trim();

  if (!partNumber) {
    document.getElementById('lookupResult').textContent =
      'Please enter a part number.';
    return;
  }

  document.getElementById('lookupResult').textContent =
    'Looking up part stock...';

  const { data, error } = await client
    .from('inventory_part_lookup_view')
    .select('*')
    .ilike('part_number', partNumber)
    .order('location_name', { ascending: true });

  if (error) {
    document.getElementById('lookupResult').textContent = error.message;
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById('lookupResult').textContent =
      'No stock balance found for this part.';
    return;
  }

  let totalQty = 0;
  let totalValue = 0;

  data.forEach(row => {
    totalQty += Number(row.quantity_on_hand || 0);
    totalValue += Number(row.inventory_value || 0);
  });

  let output =
    `PART NUMBER: ${data[0].part_number}\n` +
    `DESCRIPTION: ${data[0].description || ''}\n` +
    `SERIALIZED: ${data[0].is_serialized ? 'YES' : 'NO'}\n` +
    `TOTAL QTY ON HAND: ${totalQty}\n` +
    `UNIT COST: ${formatCurrency(data[0].unit_cost)}\n` +
    `TOTAL INVENTORY VALUE: ${formatCurrency(totalValue)}\n\n`;

  output += 'LOCATION | QTY ON HAND | VALUE\n';
  output += '------------------------------------------\n';

  data.forEach(row => {
    output +=
      `${row.location_name} | ` +
      `${row.quantity_on_hand} | ` +
      `${formatCurrency(row.inventory_value)}\n`;
  });

  document.getElementById('lookupResult').textContent = output;
}

function formatCurrency(value) {
  return Number(value || 0).toLocaleString('en-US', {
    style: 'currency',
    currency: 'USD'
  });
}

loadParts();
</script>

</body>
</html>
